version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 10
    versioning-strategy: increase
    commit-message:
      # `prefix: chore` + `include: scope` produces `chore(deps):` /
      # `chore(deps-dev):` titles. The earlier `prefix: chore(deps)` literal
      # caused Dependabot to emit `chore(deps)(deps-dev):` double scopes,
      # which the conventional-commits parser used by PR Lint rejects.
      prefix: 'chore'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'automated'
    reviewers:
      - 'pdugan20'
    assignees:
      - 'pdugan20'
    # Skip major-version bumps — they regularly break CI and need a human.
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
    # Group minor and patch updates together
    groups:
      expo:
        patterns:
          - 'expo*'
          - '@expo/*'
      react-native:
        patterns:
          - 'react-native*'
          - '@react-native*'
      storybook:
        patterns:
          - '@storybook/*'
          - 'storybook'
      ai-sdks:
        patterns:
          - '@anthropic-ai/*'
          - 'openai'
      dev-dependencies:
        dependency-type: 'development'
        update-types:
          - 'minor'
          - 'patch'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 5
    commit-message:
      # Same reasoning as above — avoid double-scope titles.
      prefix: 'chore'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'github-actions'
      - 'automated'
    reviewers:
      - 'pdugan20'
    assignees:
      - 'pdugan20'
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
    groups:
      actions-minor-patch:
        update-types:
          - 'minor'
          - 'patch'
