name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '22.18.0'
          cache: 'npm'

      - name: Install npm 11.5.2
        run: npm install --global npm@11.5.2

      - name: Verify npm version
        run: test "$(npm --version)" = "11.5.2"

      - name: Install dependencies
        run: npm ci

      - name: Validate automation policy
        run: npm run test:automation-policy

      - name: Validate CLAUDE.md
        run: npm run lint:claude

      - name: Prettier Check
        run: npm run format:check

      - name: ESLint
        run: npm run lint

      - name: TypeScript Check
        run: npx tsc --noEmit --skipLibCheck

      - name: Markdownlint
        run: npm run markdownlint

      - name: Knip (dead code detection)
        run: npm run knip

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Checkout code
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '22.18.0'
          cache: 'npm'

      - name: Install npm 11.5.2
        run: npm install --global npm@11.5.2

      - name: Verify npm version
        run: test "$(npm --version)" = "11.5.2"

      - name: Install dependencies
        run: npm ci

      - name: Run Tests
        run: npm run test:ci

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build-validation:
    name: Build Validation
    runs-on: ubuntu-latest
    needs: code-quality
    outputs:
      bundle_size_mb: ${{ steps.bundle_size.outputs.bundle_size_mb }}
    steps:
      - name: Checkout code
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '22.18.0'
          cache: 'npm'

      - name: Install npm 11.5.2
        run: npm install --global npm@11.5.2

      - name: Verify npm version
        run: test "$(npm --version)" = "11.5.2"

      - name: Setup Expo
        uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e # v8
        with:
          expo-version: 6.3.10
          eas-version: 21.0.2
          token: ${{ secrets.EXPO_TOKEN }}
          expo-cache: true

      - name: Install dependencies
        run: npm ci

      - name: Check Expo Dependencies
        run: npx expo install --check

      - name: Validate iOS Build Config
        run: npx expo prebuild --platform ios --no-install --clean

      - name: Cache Metro Bundler
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            .expo
            .metro
          key: ${{ runner.os }}-metro-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.js') }}
          restore-keys: |
            ${{ runner.os }}-metro-${{ hashFiles('**/package-lock.json') }}
            ${{ runner.os }}-metro-

      - name: Create Production Export
        run: npx expo export --platform ios

      - name: Check Bundle Size
        run: |
          SIZE=$(du -sk dist | cut -f1)
          SIZE_MB=$(echo "scale=2; $SIZE / 1024" | bc)
          echo "Bundle size: ${SIZE_MB}MB (${SIZE}KB)"
          echo "bundle_size=${SIZE}" >> "$GITHUB_OUTPUT"
          echo "bundle_size_mb=${SIZE_MB}" >> "$GITHUB_OUTPUT"
          if [ "$SIZE" -gt 50000 ]; then
            echo "::warning::Bundle size exceeds 50MB (${SIZE_MB}MB)"
          fi
        id: bundle_size

      - name: Upload Bundle Size Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: bundle-analysis
          path: dist/
          retention-days: 7

      - name: Clean up prebuild artifacts
        run: rm -rf ios android

  bundle-comment:
    name: Bundle Size PR Comment
    runs-on: ubuntu-latest
    needs: build-validation
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    permissions:
      pull-requests: write
    steps:
      - name: Comment Bundle Size on PR
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const size = '${{ needs.build-validation.outputs.bundle_size_mb }}';
            const body = `**Bundle Size Report**\n\niOS bundle: ${size}MB`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('Bundle Size Report'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [code-quality, test, build-validation]
    if: always()
    steps:
      - name: Check job statuses
        run: |
          echo "Code Quality: ${{ needs.code-quality.result }}"
          echo "Tests: ${{ needs.test.result }}"
          echo "Build Validation: ${{ needs.build-validation.result }}"

          if [ "${{ needs.code-quality.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.build-validation.result }}" != "success" ]; then
            echo "One or more jobs failed"
            exit 1
          fi

          echo "All CI checks passed successfully"
