name: Release

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'chore(release)')"
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '22.18.0'
          cache: 'npm'

      - name: Install npm 11.5.2
        run: npm install --global npm@11.5.2

      - name: Verify npm version
        run: test "$(npm --version)" = "11.5.2"

      - name: Install dependencies
        run: npm ci

      - name: Verify CI passed
        run: echo "Assuming CI passed from required status checks"

      - name: Release
        # Uses SEMANTIC_RELEASE_TOKEN (a PAT with admin role) so semantic-release can push
        # the release commit + tag past the main-branch ruleset. GITHUB_TOKEN runs as
        # github-actions[bot] which has no bypass on personal-account repo rulesets.
        env:
          GITHUB_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}
        run: npx semantic-release
